name: Daily Analytics Report
on:
  schedule:
    - cron: '0 0 * * *'  # UTC 0:00 = JST 9:00
  workflow_dispatch:

jobs:
  analytics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check analytics
        run: node scripts/check-analytics.js
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Commit report
        run: |
          git config user.email "limen@analytics.agent"
          git config user.name "LIMEN Analytics"
          git add output/analytics-report.md
          git commit -m "analytics $(date +%Y-%m-%d)" || exit 0
          git push
